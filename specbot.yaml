specs:
  - "specs/**/*.md"

tickets:
  provider: linear
  project: "ENG"
  mapping:
    epic: h1
    story: h2
    task: "- [ ]"
  labels:
    - "specbot-managed"

ai:
  model: "claude-sonnet-4-6"
  detail_level: "standard"

sync:
  auto_update: false
  detect_drift: true
  state_file: ".specbot/state.json"
