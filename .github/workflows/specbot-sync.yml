name: Specbot Sync Check

on:
  pull_request:
    paths:
      - "specs/**"
      - "docs/prd.md"
      - "specbot.yaml"

jobs:
  sync-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install specbot
        run: npm install -g specbot

      - name: Run specbot sync
        id: sync
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          set +e
          OUTPUT=$(specbot sync 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          echo "$OUTPUT" > /tmp/sync-output.txt
          DRIFT_COUNT=$(echo "$OUTPUT" | grep -cE '^\s*(đź“ť|đź”„|âťŚ|đź‘»)' || true)
          echo "drift_count=$DRIFT_COUNT" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/sync-output.txt', 'utf8');
            const driftCount = parseInt('${{ steps.sync.outputs.drift_count }}' || '0');
            const exitCode = parseInt('${{ steps.sync.outputs.exit_code }}' || '0');

            let icon, title, status;
            if (exitCode !== 0) {
              icon = 'âš ď¸Ź'; title = 'Specbot sync encountered an error'; status = 'error';
            } else if (driftCount === 0) {
              icon = 'âś…'; title = 'Specs and tickets are in sync'; status = 'ok';
            } else {
              icon = 'đź”Ť'; title = `Specbot found ${driftCount} drift item(s)`; status = 'drift';
            }

            const body = [
              `## ${icon} ${title}`, '',
              '<details>', '<summary>Full sync output</summary>', '', '```', output, '```', '</details>', '',
              status === 'drift' ? '> **Action needed:** Review the drift above and update tickets or specs as needed.'
                : status === 'ok' ? '> No action needed â€” everything is consistent.'
                : '> Sync failed. Check that API key secrets are configured.',
              '', '---', '_Posted by [specbot](https://github.com/othmanabuzeid/specbot)_'
            ].join('\n');

            const marker = '_Posted by [specbot]';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
              });
            }
